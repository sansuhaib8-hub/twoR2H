name: Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - run: flutter clean
      - run: flutter pub get
      - run: flutter build apk --release --verbose > build_log.txt 2>&1 || true

      - uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
