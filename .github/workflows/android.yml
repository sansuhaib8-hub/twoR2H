name: Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - run: flutter clean

      - run: flutter pub get

      - run: flutter build apk --release || true

      - name: Find and move APK
        run: |
          APK=$(find build -name "*.apk" | head -1)
          echo "Found APK: $APK"
          mkdir -p output
          if [ -n "$APK" ]; then
            cp "$APK" output/app-release.apk
            echo "APK copied to output/"
          else
            echo "ERROR: No APK found!"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: output/app-release.apk
